<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izabela Kubies | Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Dekorativní prvky */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }
        .shape1 { width: 400px; height: 400px; background: rgba(0, 184, 148, 0.2); top: -100px; left: -100px; }
        .shape2 { width: 300px; height: 300px; background: rgba(9, 132, 227, 0.2); bottom: -50px; right: 10%; }

        /* Karta */
        .profile-container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
            z-index: 10;
            animation: fadeIn 1s ease-out;
        }

        .profile-pic {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #00b894, #0984e3);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h1 { font-size: 2.2rem; margin-bottom: 5px; background: linear-gradient(to right, #fff, #74b9ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { color: #00b894; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; font-weight: 600; }
        
        p { color: #bdc3c7; line-height: 1.6; margin-bottom: 15px; }
        .highlight { color: #fff; font-weight: 600; }

        /* VYLEPŠENÉ TLAČÍTKO S ODKAZEM */
        .cta-button {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 40px;
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 184, 148, 0.3);
        }

        /* Efekt při najetí myší */
        .cta-button:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 15px 25px rgba(0, 184, 148, 0.5);
            background: linear-gradient(135deg, #00cec9 0%, #0984e3 100%);
        }

        /* Efekt při kliknutí */
        .cta-button:active {
            transform: scale(0.95);
        }

        footer { margin-top: 40px; font-size: 0.75rem; color: rgba(255,255,255,0.3); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="profile-container">
        <div class="profile-pic">IK</div>
        <h1>Izabela Kubies</h1>
        <div class="tagline">Chemie • Věda • Objevování</div>

        <p>Ahoj! Jmenuji se <span class="highlight">Izabela</span>.</p>
        <p>Je mi 19 let a věřím, že svět je jedna velká <span class="highlight">laboratoř</span> plná fascinujících tajemství.</p>

        <a href="funfacty.html" class="cta-button">
            Prozkoumat Fun Facty 🧪
        </a>

        <footer>© 2024 Izabela Kubies</footer>
    </div>

</body>
</html>
